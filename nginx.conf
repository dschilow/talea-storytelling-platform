server {
    listen ${PORT};
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # Hashed build assets: content-addressed, so a missing file means the client is
    # running a STALE build whose chunk hashes were removed by a newer deploy.
    # These MUST return a real 404 — NOT the index.html SPA fallback. Serving HTML
    # (status 200) for a missing *.js makes the browser's dynamic import() parse HTML
    # as a module and throw "Failed to fetch dynamically imported module", which
    # masks the deploy-skew. A genuine 404 lets the client detect it and hard-reload.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other cacheable static files (logos, fonts, icons at the web root).
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must NEVER be cached long-term: it holds the references to the
    # current hashed chunks. If the browser serves a stale index.html, it requests
    # chunk hashes that a newer deploy already deleted (the 404s that triggered the
    # "auth unavailable" screen). Always revalidate so a redeploy is picked up.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # config.js is generated per-container at startup — never cache it.
    location = /config.js {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Handle client-side routing: navigation requests resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
